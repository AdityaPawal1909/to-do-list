<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <!-- Heading -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold">
                    📝 To-Do List
                </h2>
                <button id="themeBtn" class="btn btn-dark">
                    🌙 Dark Mode
                </button>
            </div>
            <!-- Search Box -->
            <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search Tasks...">
            <!-- Add Task -->
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter a Task">
                <button id="addBtn" class="btn btn-primary">
                    Add Task
                </button>
            </div>
            <!-- Filters -->
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-secondary filterBtn" data-filter="all">
                    All
                </button>
                <button class="btn btn-success filterBtn" data-filter="completed">
                    Completed
                </button>
                <button class="btn btn-warning filterBtn" data-filter="pending">
                    Pending
                </button>
            </div>
            <!-- Counter -->
            <div class="mb-3">
                <strong>Total :</strong>
                <span id="totalCount">0</span>
                |
                <strong>Completed :</strong>
                <span id="completedCount">0</span>
                |
                <strong>Pending :</strong>
                <span id="pendingCount">0</span>
            </div>
            <!-- Task List -->
            <ul id="taskList" class="list-group">
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
